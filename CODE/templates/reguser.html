{% extends "adpage.html" %}
{% block content %}
<center>
    <div class="close-btn" onclick="closeTable()">X</div>
    
<table border="2" width="100%" class="form-control" style="width:50rem;overflow:scroll;">
    <tr>
        <th style="text-align: center"> User_id</th>
        <th style="text-align: center">User name</th>
        <th style="text-align: center">password</th>
        <th style="text-align: center"> mail_id</th>
        <th style="text-align: center">mobile_no</th>
        <th style="text-align: center"> Address</th>
        <th style="text-align: center"> status</th>
        <th style="text-align: center"> Accept</th>
        <th style="text-align: center">  Rejected</th>
    </tr>
    {% for i in reguser %}
        <tr>
            <td style="text-align: center"> {{ i[0] }}</td>
            <td style="text-align: center"> {{ i[1] }}</td>
            <td style="text-align: center"> {{ i[2] }}</td>
            <td style="text-align: center"> {{ i[3] }}</td>
            <td style="text-align: center"> {{ i[4] }}</td>
            <td style="text-align: center"> {{ i[5] }}</td>
            <td style="text-align: center"> {{ i[6] }}</td>
            <td style="text-align: center">
                <form action="{{ url_for("statusAccept",id=i[0]) }}" method="post">
                    <button type="submit" class="btn btn-info" >Accept</button>
                </form>
            </td>
            <td>
                <form action="{{ url_for("statusReject",id=i[0]) }}" method="post">
                    <button type="submit" class="btn btn-warning" >Reject</button>
                </form>
            </td>
        </tr>
    {% endfor %}
</table>
</center>
{% endblock %}
