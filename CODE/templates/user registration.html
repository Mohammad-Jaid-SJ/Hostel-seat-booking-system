{% extends "home.html" %}
{% block content %}
 {% if msg=="registered" %}
     <div class="container">
         <div class="alert alert-success alert-dismissible">
             <a href="#" class="close" data-dismiss="alert" aria-label="close">&times;</a>
             <h3>registerd successfully</h3>
         </div>
     </div>
 {% endif %}

<center>
<div class="container" style="text-align: center">
    <center>
        

        <form name="my-form" class="form-control" onsubmit="return validform()" action="{{ url_for("reg") }}"  method='post' style="width:35rem;border-radius:10px;" >
            <!--<span class="close-btn" onclick="closeForm()">X</span>-->
            <h3>User Registration Page</h3>
            
            <div class="form-group row">
                <label style="width: 25%">User name:</label>
                    <input type="text" class="form-control" placeholder="Enter user name" name="un" style="width:25rem" required>
            </div><br>
            <div class="form-group row">
                <label style="width: 25%">Admission Number:</label>
                    <input type="text" class="form-control" placeholder="Enter Admission Number" name="un" style="width:25rem" required>
            </div><br>
            
            <div class="form-group row">
                <label style="width: 25%"> Email Id :</label>
                    <input type="email" class="form-control" placeholder="Enter your mail id" name="mail" style="width:25rem" required>
            </div><br>
            <div class="form-group row">
                <label style="width: 25%"> Password :</label>
                    <input type="password" class="form-control" placeholder="Enter your password" name="pwd" style="width:25rem" required>
            </div><br>
            <div class="form-group row">
                <label style="width: 25%"> Mobile No :</label>
                    <input type="text" class="form-control" placeholder="Enter your mobile no" name="mn" style="width:25rem" required>
            </div><br>
            <!--div class="form-group row">
                <label style="width: 25%"> Address :</label>
                    <input type="text" class="form-control" placeholder="Enter your address" style="width:25rem" name="ad" required>
            </div--><br>
            
            <button type="submit" class="btn btn-info">submit</button>
            <button type="reset" class="btn btn-info">Reset</button>
        </form>
    </center>
</div>
<style>
    .close-btn {
    position: center;
    top: 10px;
    right: 10px;
    background: red;
    color: white;
    font-size: 16px;
    font-weight: bold;
    padding: 5px 10px;
    border-radius: 50%;
    cursor: pointer;
}
.close-btn:hover {
    background: darkred;
}

</style>
<script>
    function closeForm() {
    document.querySelector(".container").style.display = "none";
}

</script>

{% endblock %}
