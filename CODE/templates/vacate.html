{% extends "log.html" %}
{% block content %}
<div class="container mt-4">
    {% for i in results %}
    <form action="{{ url_for("vacate") }}" method="post" class="form-control mb-4 p-4" style="width:40rem;">
        
        <h2 class="mb-4 text-center" style="color: black; text-decoration: underline;">Vacate Form</h2>


        <div class="form-group mb-3">
            <label class="form-label">User name:</label>
            <input value="{{ i[0] }}" type="text" class="form-control" name="un" readonly>
        </div>

        <div class="form-group mb-3">
            <label class="form-label">User mail:</label>
            <input value="{{ i[1] }}" type="text" class="form-control" name="mail" readonly>
        </div>

        <div class="form-group mb-3">
            <label class="form-label">Selected hostel:</label>
            <input value="{{ i[2] }}" type="text" class="form-control" name="hostelname" required placeholder="Enter hostel name">
        </div>

        <div class="form-group mb-3">
            <label class="form-label">Vacating or not:</label>
            <select class="form-control" name="vacate" required>
                <option value="" disabled selected>Select an option</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>
        </div>

        <div class="form-group mb-4">
            <label class="form-label">Reason:</label>
            <input type="text" class="form-control" name="reason" required placeholder="Reason for vacating">
        </div>

        <div class="text-center">
            <button type="submit" class="btn btn-info">Submit</button>
        </div>
    </form>
    {% endfor %}
</div>
{% endblock %}
